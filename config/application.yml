server:
  host: 0.0.0.0
  port: 8080
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/skeletondb
  max_connections: 10
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
logging:
  level: info
  format: json
  file: logs/catalog.log
module:
  name: catalog
  enabled: true
features:
  soft_delete: true
  state_machines: false
  workflows: true
entities:
  item:
    collection: items
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  item_group:
    collection: item_groups
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  uom:
    collection: uoms
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  uom_conversion:
    collection: uom_conversions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  attribute:
    collection: attributes
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  attribute_value:
    collection: attribute_values
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  item_variant:
    collection: item_variants
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  brand:
    collection: brands
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
