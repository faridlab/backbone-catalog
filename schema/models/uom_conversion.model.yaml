# =============================================================================
# Domain: Catalog
# Entity: UomConversion
# Description: A global conversion factor between two units. Interpreted as
#   1 <from_uom> = <factor> <to_uom>   (e.g. 1 BOX = 12 PCS → factor 12).
# Item-specific conversions can be layered later; this is the shared base table.
# =============================================================================

models:
  - name: UomConversion
    collection: uom_conversions
    description: "Conversion factor between two units of measure (1 from = factor to)"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique conversion identifier"

      from_uom_id:
        type: uuid
        attributes: ["@required", "@foreign_key(Uom.id)"]
        description: "Source unit"

      to_uom_id:
        type: uuid
        attributes: ["@required", "@foreign_key(Uom.id)"]
        description: "Target unit"

      factor:
        type: decimal
        attributes: ["@required", "@precision(18,6)", "@positive"]
        description: "How many to_uom equal one from_uom (must be > 0)"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      from_uom:
        type: Uom
        attributes: ["@one", "@foreign_key(from_uom_id)"]
        description: "Source unit"

      to_uom:
        type: Uom
        attributes: ["@one", "@foreign_key(to_uom_id)"]
        description: "Target unit"

    indexes:
      - type: unique
        fields: [from_uom_id, to_uom_id]
        where: "deleted_at IS NULL"
      - type: index
        fields: [from_uom_id]
